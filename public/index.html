<style>
    /* ... deine bisherigen Styles ... */
    
    .league-card { 
        height: 280px; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        border-radius: 35px; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        cursor: pointer; 
        border: 1px solid rgba(255,255,255,0.05);
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
    }

    /* 1. Liga Blau-Glow */
    .bl1-hover:hover { 
        border-color: #0033cc; 
        box-shadow: 0 0 40px rgba(0, 51, 204, 0.3);
        transform: translateY(-10px);
    }

    /* 2. Liga Rot-Glow */
    .bl2-hover:hover { 
        border-color: #ff0000; 
        box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
        transform: translateY(-10px);
    }

    .logo-img {
        width: 120px;
        height: auto;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
    }
</style>

<!-- STARTBILDSCHIRM: PROFI-LIGA-AUSWAHL -->
<div id="setup-screen" class="min-h-screen flex flex-col justify-center p-6 bg-[#020202]">
    <div class="text-center mb-16">
        <h1 class="f95-red text-4xl italic mb-2 tracking-tighter uppercase font-black">MASTER<span class="text-white ml-2 text-2xl">CENTER</span></h1>
        <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.5em]">Select Competition</p>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 max-w-2xl mx-auto w-full">
        <!-- 1. BUNDESLIGA KACHEL -->
        <div onclick="startApp('1. BL')" class="league-card bl1-hover">
            <img src="https://wikimedia.org" alt="1. BL Logo" class="logo-img">
            <div class="text-center">
                <p class="font-black italic uppercase text-xs tracking-[0.3em] text-blue-500">1. Bundesliga</p>
                <p class="text-[8px] text-zinc-500 uppercase mt-2">306 Matches • Archive</p>
            </div>
        </div>

        <!-- 2. BUNDESLIGA KACHEL -->
        <div onclick="startApp('2. BL')" class="league-card bl2-hover">
            <img src="https://wikimedia.org" alt="2. BL Logo" class="logo-img">
            <div class="text-center">
                <p class="font-black italic uppercase text-xs tracking-[0.3em] text-red-600 tracking-tighter">2. Bundesliga</p>
                <p class="text-[8px] text-zinc-500 uppercase mt-2 italic font-bold">Focus: Fortuna Düsseldorf</p>
            </div>
        </div>
    </div>
</div>
