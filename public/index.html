<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buli Master LIVE</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #ffffff; }
        .glass { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        .live-pulse { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">
    <header class="mb-8 flex justify-between items-center border-b border-white/10 pb-4">
        <h1 class="text-2xl font-black text-blue-500 italic">LIVE <span class="text-white uppercase tracking-tighter">Master</span></h1>
        <div class="flex gap-2 text-xs font-bold uppercase">
            <span class="text-slate-400">Tipper:</span> <span class="text-blue-400" id="currentTipper">Sven</span>
        </div>
    </header>

    <div class="space-y-4">
        <!-- Live-Beispiel für Kiel gegen Lautern -->
        <div class="glass p-6 rounded-3xl relative overflow-hidden">
            <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 mb-4 tracking-widest">
                <span class="flex items-center gap-2"><div class="live-pulse"></div> LIVE • 53'</span>
                <span>2. BUNDESLIGA</span>
            </div>
            <div class="flex items-center justify-between text-center">
                <div class="flex-1 font-bold">Holstein Kiel</div>
                <div class="px-6 text-3xl font-black bg-black/30 py-2 rounded-2xl">3 : 0</div>
                <div class="flex-1 font-bold text-slate-300">Kaiserslautern</div>
            </div>
            <div class="mt-6 pt-4 border-t border-white/5 flex justify-around items-center">
                <div class="text-center"><p class="text-[9px] text-slate-500 uppercase">Sven</p><p class="font-bold text-blue-400">2:1</p></div>
                <div class="text-center"><p class="text-[9px] text-slate-500 uppercase">Melli</p><p class="font-bold text-blue-400">1:1</p></div>
                <div class="text-center"><p class="text-[9px] text-slate-500 uppercase">S.P.</p><p class="font-bold text-blue-400">0:2</p></div>
            </div>
        </div>
    </div>
</body>
</html>
