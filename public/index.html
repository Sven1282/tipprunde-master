<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER TIPPRUNDE 25/26 - ARCHIV</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .f95-red { color: #ff0000; font-family: 'Syncopate', sans-serif; text-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .glass-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; transition: 0.3s; }
        .f95-border { border: 2px solid #ff0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.15); }
        .snap-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .snap-page { min-width: 100vw; scroll-snap-align: start; padding: 20px; box-sizing: border-box; }
        input { background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-weight: 900; width: 34px; height: 34px; text-align: center; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #ff0000; color: #ff0000; }
        .user-label { font-size: 8px; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-40">

    <header class="p-6 sticky top-0 bg-black/90 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="f95-red text-2xl italic uppercase tracking-tighter underline decoration-red-600 decoration-4 underline-offset-8">MASTER<span class="text-white">26</span></h1>
                <div class="text-[10px] font-black text-zinc-500 uppercase tracking-widest bg-zinc-900 px-3 py-1 rounded-full">Saison 25/26</div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-zinc-950 p-3 rounded-2xl border border-white/5 text-center"><p class="user-label text-blue-500">Sven</p><p class="text-xl font-black">192</p></div>
                <div class="bg-zinc-950 p-3 rounded-2xl border border-red-600/30 text-center"><p class="user-label text-pink-500">Melli</p><p class="text-xl font-black text-red-600">238</p></div>
                <div class="bg-zinc-950 p-3 rounded-2xl border border-white/5 text-center"><p class="user-label text-emerald-500">S.P.</p><p class="text-xl font-black">224</p></div>
            </div>
        </div>
    </header>

    <!-- NATIVES SWIPEN: SPIELTAG 1 LINKS BIS 34 RECHTS -->
    <div class="snap-container" id="masterView">
        <div class="w-full text-center py-20 text-zinc-600 animate-pulse uppercase font-black tracking-widest text-xs">Lade Archiv...</div>
    </div>

    <footer class="fixed bottom-0 w-full p-6 bg-black/90 border-t border-white/5 z-50">
        <div class="max-w-md mx-auto">
            <button onclick="saveAll()" class="w-full bg-[#ff0000] py-5 rounded-2xl font-black text-xs uppercase tracking-[5px] shadow-[0_0_30px_rgba(255,0,0,0.3)] active:scale-95 transition-all">
                Tipps Sichern
            </button>
        </div>
    </footer>

    <script>
        const users = ['Sven', 'Melli', 'S.P.'];

        async function load() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                // CHRONOLOGISCHE SORTIERUNG
                const sortedMatches = data.matches.sort((a, b) => new Date(a.match_date) - new Date(b.match_date));
                const rounds = [...new Set(sortedMatches.map(m => m.round))];
                
                const view = document.getElementById('masterView');
                view.innerHTML = '';

                rounds.forEach(r => {
                    let html = `<div class="snap-page">
                        <div class="flex justify-between items-end mb-8">
                            <h2 class="text-3xl font-black italic tracking-tighter uppercase">Tag ${r}</h2>
                            <span class="text-[10px] font-black text-zinc-600 uppercase mb-1">Archiv 25/26</span>
                        </div>`;
                    
                    const rMatches = sortedMatches.filter(m => m.round === r);
                    
                    rMatches.forEach(m => {
                        const isF95 = m.home_team.includes('Düsseldorf') || m.away_team.includes('Düsseldorf');
                        html += `
                        <div class="glass-card mb-6 ${isF95 ? 'f95-border' : ''}">
                            <div class="flex justify-between text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-4">
                                <span>${m.league} • Match ID: ${m.id}</span>
                                <span class="text-white">${m.result !== '-:-' ? 'Endstand: ' + m.result : 'Offen'}</span>
                            </div>
                            <div class="flex items-center justify-between gap-2 mb-6">
                                <div class="flex-1 text-xs font-black uppercase tracking-tighter leading-tight">${m.home_team}</div>
                                <div class="text-red-600 font-black italic text-xs px-2">VS</div>
                                <div class="flex-1 text-right text-xs font-black uppercase tracking-tighter leading-tight text-zinc-400">${m.away_team}</div>
                            </div>
                            <!-- TIPP-BOXEN FÜR ALLE DREI -->
                            <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-4">
                                ${users.map(u => `
                                    <div class="text-center">
                                        <p class="user-label ${u === 'Sven' ? 'text-blue-500' : u === 'Melli' ? 'text-pink-500' : 'text-emerald-500'}">${u}</p>
                                        <div class="flex justify-center gap-1">
                                            <input type="number" id="t-${m.id}-${u}-h" placeholder="0">
                                            <input type="number" id="t-${m.id}-${u}-a" placeholder="0">
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                    view.innerHTML += html;
                });
            } catch (e) {
                console.error(e);
            }
        }

        function saveAll() {
            alert('MASTER-SYSTEM: Alle archivierten Tipps wurden gesichert!');
        }

        load();
    </script>
</body>
</html>
