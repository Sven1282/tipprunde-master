<!-- Design Auszug: Kopiere dies in deine index.html -->
<body class="bg-[#020617] text-white selection:bg-blue-500">
    <!-- Breaking News Ticker -->
    <div class="bg-red-600/10 border-b border-red-500/20 py-2 overflow-hidden">
        <div class="animate-marquee whitespace-nowrap text-[10px] font-black uppercase tracking-widest text-red-500">
            +++ BREAKING: Kiel führt 3:0 gegen Kaiserslautern +++ Schalke seit 9 Spielen ungeschlagen +++ Anpfiff St. Pauli vs. Köln um 20:30 Uhr +++
        </div>
    </div>

    <!-- Match List mit Statistik-Badge -->
    <main class="p-4 space-y-6">
        <div class="glass-card p-6 border-l-4 border-green-500">
            <div class="flex justify-between items-center text-[9px] font-bold text-slate-500 mb-2">
                <span>2. BUNDESLIGA • LIVE 82'</span>
                <span class="bg-green-500/20 text-green-500 px-2 py-0.5 rounded">STATISTIK: KIEL 68% BALLBESITZ</span>
            </div>
            <!-- Live Score Area -->
            <div class="flex justify-between items-center">
                <span class="font-black">KIEL</span>
                <span class="text-4xl font-black italic tracking-tighter">3 : 0</span>
                <span class="font-black text-slate-400">LAUTERN</span>
            </div>
        </div>
    </main>
</body>
