<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BULIMASTER 25/26</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .fortuna-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 5px solid #ff0000; box-shadow: 0 10px 30px -10px rgba(255,0,0,0.3); }
        .snap-x { scroll-snap-type: x mandatory; display: flex; overflow-x: auto; scroll-behavior: smooth; }
        .snap-center { scroll-snap-align: center; min-width: 100vw; }
        .h2h-bar { height: 4px; background: #334155; border-radius: 2px; }
        .h2h-fill { height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        input { background: #020617; border: 1px solid #334155; color: #ff0000; font-weight: 900; }
    </style>
</head>
<body class="pb-32">
    <div class="bg-red-600 text-[10px] font-black py-1 text-center italic animate-pulse">+++ LIVE: KIEL DEMONTIERT LAUTERN 3:0 +++ SVEN FÜHRT +++</div>
    
    <header class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
        <h1 style="font-family: 'Orbitron'" class="text-xl italic tracking-tighter">BULI<span class="text-red-600">MASTER</span></h1>
        <div class="flex gap-2" id="userSwitch">
            <button onclick="setUser('Sven')" class="w-10 h-10 rounded-full border-2 border-red-600 font-black" id="u-Sven">S</button>
            <button onclick="setUser('Melli')" class="w-10 h-10 rounded-full border-2 border-slate-700 font-black text-slate-500" id="u-Melli">M</button>
            <button onclick="setUser('S.P.')" class="w-10 h-10 rounded-full border-2 border-slate-700 font-black text-slate-500" id="u-SP">P</button>
        </div>
    </header>

    <div class="snap-x no-scrollbar" id="gameArea">
        <!-- Spieltag 30 Page -->
        <div class="snap-center p-6">
            <h2 class="text-3xl font-black italic mb-6">Spieltag 30</h2>
            
            <!-- Fortuna Highlight Game -->
            <div class="fortuna-card p-6 rounded-3xl mb-6">
                <div class="flex justify-between text-[9px] font-black text-red-500 mb-4 tracking-widest uppercase">
                    <span>2. Bundesliga • Top Analyse</span>
                    <span>H2H: 62%</span>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <div class="text-center">
                        <p class="font-black text-red-500">F. DÜSSELDORF</p>
                        <div class="h2h-bar mt-1 w-20"><div class="h2h-fill w-[62%]"></div></div>
                    </div>
                    <div class="text-2xl font-black italic">VS</div>
                    <div class="text-center text-slate-400">
                        <p class="font-black">SCHALKE 04</p>
                    </div>
                </div>
                <div class="flex justify-center gap-3">
                    <input type="number" class="w-12 h-12 rounded-xl text-center text-xl" placeholder="0">
                    <input type="number" class="w-12 h-12 rounded-xl text-center text-xl" placeholder="0">
                </div>
            </div>

            <!-- Live Match Info -->
            <div class="bg-slate-900/50 p-6 rounded-3xl border border-white/5">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-blue-500 font-black text-xs uppercase italic">Endstand</span>
                    <span class="text-[10px] text-slate-500 font-bold">KIEL : LAUTERN</span>
                </div>
                <div class="text-4xl font-black tracking-tighter text-center">3 : 0</div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-[#0a0f18] border-t border-white/10 p-5 rounded-t-[2.5rem]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[9px] font-bold text-slate-500 uppercase">Führender</p>
                <p class="text-lg font-black italic">SVEN <span class="text-red-600">+3 PKT</span></p>
            </div>
            <button class="bg-red-600 px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-red-600/30">Save Tips</button>
        </div>
    </footer>

    <script>
        function setUser(name) {
            document.querySelectorAll('#userSwitch button').forEach(b => {
                b.classList.replace('border-red-600', 'border-slate-700');
                b.classList.add('text-slate-500');
            });
            const id = name === 'S.P.' ? 'u-SP' : 'u-' + name;
            document.getElementById(id).classList.replace('border-slate-700', 'border-red-600');
            document.getElementById(id).classList.remove('text-slate-500');
        }
    </script>
</body>
</html>
